services:
  mongo:
    image: mongo:7
    container_name: wallnet-sec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: wallnet-sec-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/wallnet-sec
      TOKEN_SECRET: replace-with-production-secret
      CORS_ORIGIN: http://localhost:3001
      PARTNER_CALLBACK_ALLOWLIST: http://localhost:3001
      JSON_LIMIT: 20kb
      VISUAL_SESSION_TTL_MS: 300000
      VISUAL_MAX_ATTEMPTS: 3
    depends_on:
      - mongo
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
    container_name: wallnet-sec-client
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_API_BASE_URL: http://backend:3000/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  mongo_data:
